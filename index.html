<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <!-- Google Fonts: Poppins & Nunito -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- App Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 1. Balance Display -->
  <header id="balance-display">
    <p>Total Pengeluaran</p>
    <h1 id="balance-amount">Rp 0</h1>
  </header>

  <!-- 2. Main content grid: Input Form + Chart side by side on desktop -->
  <main class="main-grid">

    <!-- Input Form -->
    <section id="input-form-section" class="card">
      <h2>Tambah Pengeluaran</h2>
      <form id="transaction-form" novalidate>

        <div class="form-group">
          <label for="input-item-name">Nama Item</label>
          <input
            type="text"
            id="input-item-name"
            name="itemName"
            maxlength="100"
            placeholder="Contoh: Makan siang"
            autocomplete="off"
            aria-describedby="error-itemName"
          />
          <span class="error-message" id="error-itemName" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="input-amount">Jumlah (Rp)</label>
          <input
            type="number"
            id="input-amount"
            name="amount"
            min="0.01"
            max="999999999.99"
            step="0.01"
            placeholder="Contoh: 35000"
            aria-describedby="error-amount"
          />
          <span class="error-message" id="error-amount" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="input-category">Kategori</label>
          <select
            id="input-category"
            name="category"
            aria-describedby="error-category"
          >
            <option value="">Pilih kategori...</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span class="error-message" id="error-category" role="alert"></span>
        </div>

        <button type="submit">Tambah</button>
      </form>
    </section>

    <!-- Pie Chart -->
    <section id="chart-section" class="card" aria-label="Grafik distribusi pengeluaran">
      <h2>Distribusi Pengeluaran</h2>
      <canvas id="expense-chart" role="img" aria-label="Pie chart pengeluaran per kategori"></canvas>
      <p id="chart-empty-message" hidden>Belum ada data untuk ditampilkan.</p>
      <p id="chart-error" class="error-message" role="alert"></p>
    </section>

  </main>

  <!-- 3. Transaction List -->
  <section id="transaction-list-section" class="card">
    <h2>Riwayat Transaksi</h2>
    <ul id="transaction-list" aria-label="Daftar transaksi"></ul>
    <p id="list-empty-message">Belum ada transaksi.</p>
  </section>

  <!-- 4. Global error banner -->
  <div id="error-global" class="error-banner" role="alert" aria-live="polite"></div>

  <!-- App Script -->
  <script src="js/script.js"></script>
</body>
</html>
